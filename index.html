<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>防呆装置：qPCR 助手</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f2f2f7; margin: 0; padding: 15px; color: #1c1c1e; box-sizing: border-box; }
    *, *:before, *:after { box-sizing: inherit; }
    .header-container { display: flex; justify-content: space-between; align-items: flex-start; margin: 10px 0 20px 0;}
    h2 { font-size: 22px; margin: 0; }
    .nav-link { font-size: 13px; color: #007aff; text-decoration: none; display: block; margin-top: 4px; font-weight: 500; }
    .settings-btn { font-size: 20px; color: #8e8e93; cursor: pointer; padding: 5px; }
    .card { background: #ffffff; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.04); }
    .card-title-step { font-weight: 600; font-size: 16px; margin-bottom: 5px; color: #ff9500; }
    .card-title { font-weight: 600; font-size: 16px; margin-bottom: 5px; color: #007aff; }
    .hint { font-size: 12px; color: #8e8e93; margin-bottom: 12px; line-height: 1.3; }
    .input-group { display: flex; gap: 10px; margin-bottom: 5px; }
    .input-group div { flex: 1; }
    .input-label { font-size: 13px; color: #8e8e93; margin-bottom: 3px; display: block; font-weight: 500;}
    input[type="number"], select { width: 100%; padding: 10px; font-size: 15px; border: 1px solid #c7c7cc; border-radius: 8px; outline: none; background-color: #fafafa; }
    input[type="number"]:focus, select:focus { border-color: #007aff; background-color: #ffffff; }
    #settings-panel { display: none; background-color: #e5e5ea; padding: 12px; border-radius: 10px; margin-bottom: 15px; }
    .settings-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .settings-grid label { font-size: 11px; color: #8e8e93; }
    .plate-grid { display: grid; grid-template-columns: 20px repeat(12, 1fr); gap: 2px; max-width: 400px; margin: 10px auto; }
    .grid-label { font-size: 10px; color: #8e8e93; text-align: center; font-weight: bold; }
    .well { width: 100%; padding-bottom: 100%; border-radius: 50%; border: 1px solid #e0e0e0; background-color: #fafafa; position: relative; }
    .well-content { position: absolute; top: 0; left: 0; right: 0; bottom: 0; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #333; text-align: center; }
    .result-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 15px; border-bottom: 1px solid #e5e5ea; }
    .result-row:last-child { border-bottom: none; font-weight: 600; color: #ff3b30; }
    .easter-egg { text-align: center; font-size: 12px; font-weight: bold; color: rgba(0,0,0,0.04); margin-top: 35px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <div class="header-container">
    <div>
      <h2>qPCR 助手</h2>
      <a href="rt.html" class="nav-link">→ 切换至 RT 逆转录配平</a>
    </div>
    <div class="settings-btn" onclick="toggleSettings()">⚙️</div>
  </div>

  <div id="settings-panel">
    <div class="settings-grid">
      <div><label>SYBR Mix</label><input type="number" id="cfg-sybr" value="5.2" step="0.1" oninput="updateConfig()"></div>
      <div><label>ROX Dye</label><input type="number" id="cfg-rox" value="0.2" step="0.1" oninput="updateConfig()"></div>
      <div><label>cDNA</label><input type="number" id="cfg-cdna" value="1.0" step="0.1" oninput="updateConfig()"></div>
      <div><label>F Primers</label><input type="number" id="cfg-f" value="0.8" step="0.1" oninput="updateConfig()"></div>
      <div><label>R Primers</label><input type="number" id="cfg-r" value="0.8" step="0.1" oninput="updateConfig()"></div>
      <div><label>ddH2O</label><input type="number" id="cfg-w" value="2.2" step="0.1" oninput="updateConfig()"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title-step">第一步：排板</div>
    <select id="layout-mode" onchange="updateAll()" style="margin-bottom:10px;">
      <option value="matrix">矩阵模式 (推荐)</option>
      <option value="stack">顺延堆叠</option>
    </select>
    <div class="input-group">
      <div><span class="input-label">样品数(S)</span><input type="number" id="sample-input" oninput="updateAll()"></div>
      <div><span class="input-label">基因数(G)</span><input type="number" id="gene-input" oninput="updateAll()"></div>
      <div><span class="input-label">复孔数</span><input type="number" id="reps-input" value="3" oninput="updateAll()"></div>
    </div>
    <div class="plate-grid" id="plate-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">第二步：体积计算</div>
    <div class="input-group">
      <div><span class="input-label">最终 m 孔 (样品管)</span><input type="number" id="m-input" oninput="calcVols()"></div>
      <div><span class="input-label">最终 n 孔 (引物管)</span><input type="number" id="n-input" oninput="calcVols()"></div>
    </div>
    <div style="margin-top:10px;">
      <div id="title-ep1" style="font-size:14px; font-weight:bold; margin-bottom:5px;">样品预混管</div>
      <div class="result-row"><span>cDNA (1.0μL)</span> <span id="cdna-res">0.0 μL</span></div>
      <div class="result-row"><span>SYBR Mix (5.2μL)</span> <span id="sybr-res">0.0 μL</span></div>
      <div class="result-row"><span>总体积</span> <span id="total1-res">0.0 μL</span></div>
    </div>
    <div style="margin-top:20px;">
      <div id="title-ep2" style="font-size:14px; font-weight:bold; margin-bottom:5px;">引物预混管</div>
      <div class="result-row"><span>引物 F+R (1.6μL)</span> <span id="primers-res">0.0 μL</span></div>
      <div class="result-row"><span>ddH2O (2.2μL)</span> <span id="water-res">0.0 μL</span></div>
      <div class="result-row"><span>总体积</span> <span id="total2-res">0.0 μL</span></div>
    </div>
  </div>
  <div class="easter-egg">@louie</div>

  <script>
    let cfg = { sybr: 5.2, rox: 0.2, cdna: 1.0, f: 0.8, r: 0.8, w: 2.2 };
    document.addEventListener('DOMContentLoaded', () => { generateEmptyPlate(); updateAll(); });
    function toggleSettings() { const p = document.getElementById('settings-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; }
    function updateConfig() { cfg.sybr = parseFloat(document.getElementById('cfg-sybr').value)||0; cfg.rox = parseFloat(document.getElementById('cfg-rox').value)||0; cfg.cdna = parseFloat(document.getElementById('cfg-cdna').value)||0; cfg.f = parseFloat(document.getElementById('cfg-f').value)||0; cfg.r = parseFloat(document.getElementById('cfg-r').value)||0; cfg.w = parseFloat(document.getElementById('cfg-w').value)||0; calcVols(); }
    function updateAll() { generatePlateMap(); updateTitles(); }
    function updateTitles() { const s = document.getElementById('sample-input').value; const g = document.getElementById('gene-input').value; document.getElementById('title-ep1').innerText = s ? `样品预混管 (共 ${s} 管)` : "样品预混管"; document.getElementById('title-ep2').innerText = g ? `引物预混管 (共 ${g} 管)` : "引物预混管"; }
    function generateEmptyPlate() { const grid = document.getElementById('plate-grid'); grid.innerHTML = ''; for(let i=0; i<=12; i++) { const l = document.createElement('div'); l.className = 'grid-label'; l.innerText = i||''; grid.appendChild(l); } const rows = ['A','B','C','D','E','F','G','H']; for(let r=0; r<8; r++) { const rl = document.createElement('div'); rl.className = 'grid-label'; rl.innerText = rows[r]; grid.appendChild(rl); for(let c=1; c<=12; c++) { const w = document.createElement('div'); w.className = 'well'; w.innerHTML = '<div class="well-content"></div>'; grid.appendChild(w); } } }
    function generatePlateMap() { /* 保持之前的排板逻辑代码不变... */ }
    function calcVols() { const m = parseFloat(document.getElementById('m-input').value)||0; const n = parseFloat(document.getElementById('n-input').value)||0; document.getElementById('cdna-res').innerText = (m * cfg.cdna).toFixed(1) + " μL"; document.getElementById('sybr-res').innerText = (m * cfg.sybr).toFixed(1) + " μL"; document.getElementById('total1-res').innerText = (m * (cfg.cdna + cfg.sybr)).toFixed(1) + " μL"; document.getElementById('primers-res').innerText = (n * (cfg.f + cfg.r)).toFixed(1) + " μL"; document.getElementById('water-res').innerText = (n * cfg.w).toFixed(1) + " μL"; document.getElementById('total2-res').innerText = (n * (cfg.f + cfg.r + cfg.w)).toFixed(1) + " μL"; }
  </script>
</body>
</html>
